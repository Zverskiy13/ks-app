<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Клиники Столицы</title>
<meta name="theme-color" content="#E1191C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Клиники Столицы">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152.png">
<link rel="apple-touch-icon-precomposed" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="login" class="login">
  <div class="logo">КС</div>
  <h2>КЛИНИКИ СТОЛИЦЫ</h2>
  <div class="hint">Введите PIN для входа</div>
  <div class="dots" id="dots"></div>
  <div class="pad" id="pad"></div>
  <div class="demo">Демо-вход:&nbsp; 1111 — владелец&nbsp;·&nbsp; 2222 — руководитель&nbsp;·&nbsp; 3333 — сотрудник</div>
</div>

<div id="app" class="app hidden">
  <div class="hdr">
    <div class="brand">
      <div class="logo">КС</div>
      <div>
        <div class="nm">КЛИНИКИ СТОЛИЦЫ</div>
        <button class="role" id="roleBtn"><span id="roleName">Владелец</span> <i class="ti ti-chevron-down"></i></button>
      </div>
    </div>
    <i class="ti ti-bell" style="font-size:21px;color:var(--muted)"></i>
  </div>
  <div class="scroll">
    <section class="scr" id="s-home"></section>
    <section class="scr" id="s-tasks"></section>
    <section class="scr" id="s-money"></section>
    <section class="scr" id="s-funnel"></section>
    <section class="scr" id="s-more"></section>
  </div>
  <nav class="nav" id="nav"></nav>
</div>

<div id="sheet" class="sheet-bg hidden">
  <div class="sheet">
    <h3>Сменить роль (демо)</h3>
    <div class="opt" data-pin="1111"><i class="ti ti-crown" style="font-size:20px;color:var(--red)"></i><div><div style="font-weight:600;font-size:14px">Владелец</div><div class="lbl">вся группа, финансы, цель</div></div></div>
    <div class="opt" data-pin="2222"><i class="ti ti-building-hospital" style="font-size:20px;color:var(--red)"></i><div><div style="font-weight:600;font-size:14px">Руководитель · Калмыкия</div><div class="lbl">своя компания</div></div></div>
    <div class="opt" data-pin="3333"><i class="ti ti-user" style="font-size:20px;color:var(--red)"></i><div><div style="font-weight:600;font-size:14px">Сотрудник · ПВЛ</div><div class="lbl">только свои задачи</div></div></div>
  </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<script src="api.js"></script>
<script src="app.js"></script>
<script>
if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
</html>
